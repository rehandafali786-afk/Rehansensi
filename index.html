<!DOCTYPE html>
<html>
<head>
  <title>Sensitivity App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: orange;
      color: white;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      text-align: left;
    }

    .preset {
      background: rgba(0,0,0,0.3);
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="box">
<h2>🔥 Sensitivity Generator</h2>

<input id="ram" type="number" placeholder="Enter RAM">

<select id="style">
  <option value="rusher">Rusher</option>
  <option value="sniper">Sniper</option>
  <option value="balanced">Balanced</option>
</select>

<select id="gyro">
  <option value="off">Gyro Off</option>
  <option value="on">Gyro On</option>
</select>

<button onclick="generate()">Generate 🚀</button>

<div id="result"></div>

<h3>📊 Presets</h3>
<div id="presets"></div>

</div>

<script>
function generate(){
  let ram = document.getElementById("ram").value;
  let style = document.getElementById("style").value;
  let gyro = document.getElementById("gyro").value;

  let general = ram <= 3 ? 90 : ram <= 6 ? 120 : 160;

  if(style === "rusher") general += 20;
  if(style === "sniper") general -= 15;
  if(gyro === "on") general *= 0.8;

  document.getElementById("result").innerHTML =
    "<b>General:</b> " + Math.round(general);
}

function loadPresets(){
  let presets = JSON.parse(localStorage.getItem("presets")) || [];

  let html = "";
  presets.forEach(p => {
    html += `<div class="preset">${p.name} - ${p.value}</div>`;
  });

  document.getElementById("presets").innerHTML = html;
}

loadPresets();
</script>

</body>
</html>
